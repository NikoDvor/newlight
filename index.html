    <style>
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: linear-gradient(135deg, hsl(218 38% 6%) 0%, hsl(220 42% 12%) 50%, hsl(218 38% 6%) 100%);
        transition: opacity 0.4s ease;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 160px; height: auto;
        filter: drop-shadow(0 0 40px hsla(211,96%,56%,.4));
      }
      #splash-logo img { width: 100%; height: auto; }
      #splash-text {
        margin-top: 16px;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-family: system-ui;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      #splash-fallback { display: none; margin-top: 24px; }
      #splash-fallback a {
        display: inline-block; padding: 10px 28px; border-radius: 12px; font-size: 14px;
        font-family: system-ui; font-weight: 600; color: #fff; text-decoration: none;
        background: linear-gradient(135deg, hsl(217 90% 58%), hsl(211 96% 56%));
        box-shadow: 0 4px 20px -4px hsla(211,96%,56%,.4);
      }
      #sunrise-canvas {
        position: absolute;
        inset: 0;
        z-index: 1;
      }
      #splash-logo { display: none; }
      #splash-text  { display: none; }

    </style>
    <script>
      setTimeout(function() {
        var s = document.getElementById("splash-screen");
        var f = document.getElementById("splash-fallback");
        if (s && !s.classList.contains("hide") && f) { f.style.display = "block"; }
      }, 6000);
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <canvas id="sunrise-canvas"></canvas>
      <div id="splash-logo">
        <img src="/newlight-logo.jpg" alt="NewLight" onerror="this.style.display='none'" />
      </div>
      <div id="splash-text">New Eyes To ROI</div>
      <div id="splash-fallback">
        <a href="/">Open App</a>
      </div>
    </div>
    <script>
(function(){
  var cv=document.getElementById('sunrise-canvas');
  if(!cv)return;
  var dpr=window.devicePixelRatio||1;
  var W=window.innerWidth, H=window.innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  var ctx=cv.getContext('2d');
  ctx.scale(dpr,dpr);
  var CX=W/2, CY=H*0.44, DUR=3200, t0=null, raf;
  function frame(ts){
    if(!t0)t0=ts;
    var el=ts-t0, pg=Math.min(el/DUR,1);
    ctx.fillStyle='#020509';
    ctx.fillRect(0,0,W,H);
    if(pg<0.22){
      var fp=pg/0.22, fo=fp<0.5?fp*2:2-fp*2, fR=fp*12+2;
      var fg=ctx.createRadialGradient(CX,CY,0,CX,CY,fR);
      fg.addColorStop(0,'rgba(230,245,255,'+fo+')');
      fg.addColorStop(0.4,'rgba(160,220,255,'+(fo*0.5)+')');
      fg.addColorStop(1,'rgba(59,158,255,0)');
      ctx.fillStyle=fg; ctx.beginPath();
      ctx.arc(CX,CY,fR,0,Math.PI*2); ctx.fill();
    }
    if(pg>0.06){
      var gp=(pg-0.06)/0.94, md=Math.min(W,H);
      var aR=gp*md*0.8, aO=Math.min(gp*1.4,1)*0.38;
      var ag=ctx.createRadialGradient(CX,CY,0,CX,CY,aR);
      ag.addColorStop(0,'rgba(8,38,100,'+aO+')');
      ag.addColorStop(0.5,'rgba(6,22,60,'+(aO*0.7)+')');
      ag.addColorStop(1,'rgba(2,8,20,0)');
      ctx.fillStyle=ag; ctx.beginPath();
      ctx.arc(CX,CY,aR,0,Math.PI*2); ctx.fill();
      var mp=Math.min(gp*1.4,1), mR=mp*md*0.38;
      var mg=ctx.createRadialGradient(CX,CY,0,CX,CY,mR);
      mg.addColorStop(0,'rgba(35,115,225,'+(mp*0.55)+')');
      mg.addColorStop(0.5,'rgba(25,90,200,'+(mp*0.3)+')');
      mg.addColorStop(1,'rgba(15,55,140,0)');
      ctx.fillStyle=mg; ctx.beginPath();
      ctx.arc(CX,CY,mR,0,Math.PI*2); ctx.fill();
      var cp=Math.min(gp*2.2,1), cR=cp*md*0.16;
      var cg=ctx.createRadialGradient(CX,CY,0,CX,CY,cR);
      cg.addColorStop(0,'rgba(190,230,255,'+(cp*0.9)+')');
      cg.addColorStop(0.25,'rgba(100,180,255,'+(cp*0.65)+')');
      cg.addColorStop(0.7,'rgba(59,158,255,'+(cp*0.25)+')');
      cg.addColorStop(1,'rgba(40,120,220,0)');
      ctx.fillStyle=cg; ctx.beginPath();
      ctx.arc(CX,CY,cR,0,Math.PI*2); ctx.fill();
      if(gp>0.12){
        var rp=Math.min((gp-0.12)/0.55,1);
        var rLen=rp*md*0.35;
        var rOp=rp*(1-Math.max(0,(gp-0.68)/0.32))*0.38;
        if(rOp>0.005&&rLen>0){
          for(var r=0;r<8;r++){
            var ang=r*Math.PI/4+(r%2===0?0:Math.PI/16);
            ctx.beginPath();
            ctx.moveTo(CX+Math.cos(ang)*5,CY+Math.sin(ang)*5);
            ctx.lineTo(CX+Math.cos(ang)*(5+rLen),
                       CY+Math.sin(ang)*(5+rLen));
            ctx.strokeStyle='rgba(130,205,255,'+rOp+')';
            ctx.lineWidth=0.8; ctx.stroke();
          }
        }
      }
      if(gp>0.08&&gp<0.82){
        var rPg=(gp-0.08)/0.74, rrR=rPg*md*0.55;
        var rrO=(1-rPg)*0.5;
        ctx.beginPath(); ctx.arc(CX,CY,rrR,0,Math.PI*2);
        ctx.strokeStyle='rgba(100,185,255,'+rrO+')';
        ctx.lineWidth=1; ctx.stroke();
      }
      if(gp>0.18){
        var pp=(gp-0.18)/0.82;
        for(var p=0;p<6;p++){
          var pA=p*Math.PI/3+0.4;
          var pD=pp*(50+p*10);
          var pO=pp<0.5?pp*2*0.55:(1-pp)*1.1*0.55;
          if(pO>0.005){
            ctx.fillStyle='rgba(165,220,255,'+pO+')';
            ctx.beginPath();
            ctx.arc(CX+Math.cos(pA)*pD,
                    CY+Math.sin(pA)*pD,1.5,0,Math.PI*2);
            ctx.fill();
          }
        }
      }
      var cOp=Math.min(gp*3,1)*0.88;
      var pls=4+Math.sin(el/280)*0.8;
      var pcg=ctx.createRadialGradient(CX,CY,0,CX,CY,pls*2.5);
      pcg.addColorStop(0,'rgba(245,252,255,'+cOp+')');
      pcg.addColorStop(0.5,'rgba(160,220,255,'+(cOp*0.6)+')');
      pcg.addColorStop(1,'rgba(100,180,255,0)');
      ctx.fillStyle=pcg; ctx.beginPath();
      ctx.arc(CX,CY,pls*2.5,0,Math.PI*2); ctx.fill();
    }
    if(pg>0.72){
      var lo=Math.min(1,(pg-0.72)/0.28);
      ctx.save(); ctx.textAlign='center';
      ctx.globalAlpha=lo;
      ctx.fillStyle='#ffffff';
      ctx.font='600 '+Math.round(H*0.045)+'px Arial,sans-serif';
      ctx.fillText('NEWLIGHT',CX,CY+H*0.14);
      ctx.globalAlpha=lo*0.5;
      ctx.fillStyle='rgba(126,200,227,1)';
      ctx.font=Math.round(H*0.022)+'px Arial,sans-serif';
      ctx.fillText('NEW EYES TO ROI',CX,CY+H*0.14+H*0.04);
      ctx.restore();
    }
    if(pg<1)raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);
})();
</script>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
