<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NewLight" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>NewLight</title>
    <meta name="description" content="New Eyes To ROI - AI-powered business growth platform">
    <meta name="author" content="NewLight" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NewLight" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta property="og:title" content="NewLight">
    <meta name="twitter:title" content="NewLight">
    <meta property="og:description" content="New Eyes To ROI">
    <meta name="twitter:description" content="New Eyes To ROI">
    <style>
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: linear-gradient(135deg, hsl(218 38% 6%) 0%, hsl(220 42% 12%) 50%, hsl(218 38% 6%) 100%);
        transition: opacity 0.4s ease;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 160px; height: auto;
        filter: drop-shadow(0 0 40px hsla(211,96%,56%,.4));
        opacity: 0;
        animation: nl-spl-logo 0.5s ease-out 1.0s forwards;
      }
      #splash-logo img { width: 100%; height: auto; }
      #splash-text {
        margin-top: 16px;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-family: system-ui;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0;
        animation: nl-spl-tag 0.5s ease-out 1.32s forwards;
      }
      #splash-fallback { display: none; margin-top: 24px; }
      #splash-fallback a {
        display: inline-block; padding: 10px 28px; border-radius: 12px; font-size: 14px;
        font-family: system-ui; font-weight: 600; color: #fff; text-decoration: none;
        background: linear-gradient(135deg, hsl(217 90% 58%), hsl(211 96% 56%));
        box-shadow: 0 4px 20px -4px hsla(211,96%,56%,.4);
      }
      @keyframes nl-spl-flash {
        0% { opacity:0; transform:translate(-50%,-50%) scale(0); }
        45% { opacity:1; transform:translate(-50%,-50%) scale(2.4); }
        100% { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
      }
      @keyframes nl-spl-r1 {
        0% { transform:translate(-50%,-50%) scale(0); opacity:1; }
        100% { transform:translate(-50%,-50%) scale(28); opacity:0; }
      }
      @keyframes nl-spl-r2 {
        0% { transform:translate(-50%,-50%) scale(0); opacity:0.6; }
        100% { transform:translate(-50%,-50%) scale(20); opacity:0; }
      }
      @keyframes nl-spl-r3 {
        0% { transform:translate(-50%,-50%) scale(0); opacity:0.35; }
        100% { transform:translate(-50%,-50%) scale(36); opacity:0; }
      }
      @keyframes nl-spl-edge {
        0% { transform:translate(-50%,-50%) scale(0); opacity:1; }
        70% { opacity:0.55; }
        100% { transform:translate(-50%,-50%) scale(90); opacity:0; }
      }
      @keyframes nl-spl-circ {
        from { clip-path:circle(0% at 50% 50%); }
        to   { clip-path:circle(150% at 50% 50%); }
      }
      @keyframes nl-spl-logo {
        from { opacity:0; transform:translateY(11px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes nl-spl-tag {
        from { opacity:0; transform:translateY(7px); }
        to   { opacity:0.4; transform:translateY(0); }
      }
      #splash-flash {
        position:absolute; left:50%; top:50%;
        width:8px; height:8px; border-radius:50%;
        background:#a8d8ff; opacity:0;
        pointer-events:none; z-index:6;
        animation:nl-spl-flash 0.38s ease-out 0.15s forwards;
      }
      #splash-ring-1 {
        position:absolute; left:50%; top:50%;
        width:10px; height:10px; border-radius:50%;
        border:3px solid rgba(80,170,255,0.9); opacity:0;
        pointer-events:none; z-index:5;
        animation:nl-spl-r1 0.95s ease-out 0.18s forwards;
      }
      #splash-ring-2 {
        position:absolute; left:50%; top:50%;
        width:18px; height:18px; border-radius:50%;
        border:2px solid rgba(59,158,255,0.5); opacity:0;
        pointer-events:none; z-index:5;
        animation:nl-spl-r2 1.25s ease-out 0.23s forwards;
      }
      #splash-ring-3 {
        position:absolute; left:50%; top:50%;
        width:14px; height:14px; border-radius:50%;
        border:1px solid rgba(126,200,255,0.3); opacity:0;
        pointer-events:none; z-index:5;
        animation:nl-spl-r3 1.65s ease-out 0.28s forwards;
      }
      #splash-edge {
        position:absolute; left:50%; top:50%;
        width:5px; height:5px; border-radius:50%;
        border:1.5px solid rgba(160,225,255,0.95); opacity:0;
        pointer-events:none; z-index:5;
        animation:nl-spl-edge 1.3s cubic-bezier(0.2,0,0.3,1) 0.3s forwards;
      }
      #splash-reveal {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: linear-gradient(135deg,
          hsl(218 38% 8%) 0%,
          hsl(220 42% 14%) 50%,
          hsl(218 38% 8%) 100%);
        clip-path: circle(0% at 50% 50%);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        animation: nl-spl-circ 0.88s cubic-bezier(0.2,0,0.3,1)
                   0.3s forwards;
      }
    </style>
    <script>
      setTimeout(function() {
        var s = document.getElementById("splash-screen");
        var f = document.getElementById("splash-fallback");
        if (s && !s.classList.contains("hide") && f) { f.style.display = "block"; }
      }, 6000);
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <div id="splash-logo">
        <img src="/newlight-logo.jpg" alt="NewLight" onerror="this.style.display='none'" />
      </div>
      <div id="splash-text">New Eyes To ROI</div>
      <div id="splash-fallback">
        <a href="/">Open App</a>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
