<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NewLight" />
    <meta name="theme-color" content="#1a2540" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>NewLight</title>
    <meta name="description" content="New Eyes To ROI - AI-powered business growth platform">
    <meta name="author" content="NewLight" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NewLight" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta property="og:title" content="NewLight">
    <meta name="twitter:title" content="NewLight">
    <meta property="og:description" content="New Eyes To ROI">
    <meta name="twitter:description" content="New Eyes To ROI">
    <style>
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: linear-gradient(135deg, hsl(218 38% 6%) 0%, hsl(220 42% 12%) 50%, hsl(218 38% 6%) 100%);
        transition: opacity 0.4s ease;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 160px; height: auto;
        filter: drop-shadow(0 0 40px hsla(211,96%,56%,.4));
      }
      #splash-logo img { width: 100%; height: auto; }
      #splash-text {
        margin-top: 16px;
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        font-family: system-ui;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      #splash-fallback { display: none; margin-top: 24px; }
      #splash-fallback a {
        display: inline-block; padding: 10px 28px; border-radius: 12px; font-size: 14px;
        font-family: system-ui; font-weight: 600; color: #fff; text-decoration: none;
        background: linear-gradient(135deg, hsl(217 90% 58%), hsl(211 96% 56%));
        box-shadow: 0 4px 20px -4px hsla(211,96%,56%,.4);
      }
    </style>
    <script>
      setTimeout(function() {
        var s = document.getElementById("splash-screen");
        var f = document.getElementById("splash-fallback");
        if (s && !s.classList.contains("hide") && f) { f.style.display = "block"; }
      }, 6000);
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <div id="splash-logo">
        <img src="/newlight-logo.jpg" alt="NewLight" onerror="this.style.display='none'" />
      </div>
      <div id="splash-text">New Eyes To ROI</div>
      <div id="splash-fallback">
        <a href="/">Open App</a>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
