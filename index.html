<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NewLight" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>NewLight</title>
    <meta name="description" content="New Eyes To ROI - AI-powered business growth platform">
    <meta name="author" content="NewLight" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NewLight" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/ZS00bydbjTaoFO1Sxti6Qn1KPWE2/social-images/social-1773300185889-IMG_1003.webp">
    <meta property="og:title" content="NewLight">
    <meta name="twitter:title" content="NewLight">
    <meta property="og:description" content="New Eyes To ROI">
    <meta name="twitter:description" content="New Eyes To ROI">
    <style>
      /* Splash screen shown before React mounts */
      #splash-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: linear-gradient(135deg, hsl(218 35% 10%) 0%, hsl(220 40% 16%) 50%, hsl(218 35% 10%) 100%);
        transition: opacity 0.4s ease;
      }
      #splash-screen.hide { opacity: 0; pointer-events: none; }
      #splash-logo {
        width: 180px; height: auto;
        animation: splash-pulse 2s infinite ease-in-out;
        filter: drop-shadow(0 4px 30px hsla(211,96%,56%,.3));
      }
      #splash-logo img { width: 100%; height: auto; }
      #splash-text { margin-top: 16px; color: rgba(255,255,255,0.5); font-size: 13px; font-family: system-ui; font-weight: 600; letter-spacing: 0.05em; }
      @keyframes splash-pulse {
        0%, 100% { box-shadow: 0 4px 30px -4px hsla(211,96%,56%,.4); }
        50% { box-shadow: 0 4px 50px -4px hsla(211,96%,56%,.7); }
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div id="splash-logo">
        <img src="/newlight-logo.jpg" alt="NewLight" />
      </div>
      <div id="splash-text">New Eyes To ROI</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
